name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package (with dev extras)
        run: pip install -e '.[dev]'
      - name: Lint (ruff)
        run: ruff check .
      - name: Import smoke test
        run: |
          python -c "from tangyuan import __version__; print(__version__)"
          python -c "from tangyuan.agent import TangyuanAgent; from tangyuan.tools import build_default_tools; print('ok')"
          tangyuan --help
      - name: Unit tests (pytest)
        run: pytest -q
