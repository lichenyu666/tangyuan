name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e .
      - name: Import smoke test
        run: |
          python -c "from tangyuan import __version__; print(__version__)"
          python -c "from tangyuan.agent import TangyuanAgent; from tangyuan.tools import build_default_tools; print('ok')"
          tangyuan --help
